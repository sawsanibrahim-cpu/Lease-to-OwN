<div id="root"></div>
<script>
/* --- Supabase live-data loader: fills window.__ZL__ before the app boots. */
/*     Falls back to the embedded car array if the request fails.          */
window.__ZL__=[];
(function(){
  var SUPABASE_URL="https://wpigboshlcehnlyipado.supabase.co";
  var SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwaWdib3NobGNlaG5seWlwYWRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzY1OTgsImV4cCI6MjA5OTc1MjU5OH0.FAqFDmgL-rQRGnsw_p-lZvRdL02hR5NmSBISuqLkNuA";
  try{
    var xhr=new XMLHttpRequest();
    xhr.open("GET",SUPABASE_URL+"/rest/v1/quote_cars?select=*",false);
    xhr.setRequestHeader("apikey",SUPABASE_ANON_KEY);
    xhr.setRequestHeader("Authorization","Bearer "+SUPABASE_ANON_KEY);
    xhr.send(null);
    if(xhr.status>=200&&xhr.status<300){
      var rows=JSON.parse(xhr.responseText);
      window.__ZL__=rows.map(function(c){return{
        id:+c.id,make:c.make,model:c.model,year:+c.year,mileage:+c.mileage,
        engine:c.engine,drive:c.drive,body:c.body,price:+c.price,
        warrCat:c.warrCat,annualWarr:+c.annualWarr,
        lease:(c.lease||[]).map(Number),
        reg:+c.reg,salik:+c.salik,darb:+c.darb
      };});
      console.log("[Supabase] loaded "+window.__ZL__.length+" cars");
    }else{console.warn("[Supabase] HTTP "+xhr.status+" - using embedded fallback data");}
  }catch(e){console.warn("[Supabase] load failed - using embedded fallback data",e);}
})();
</script>

        .lc-page {
          --ink: #14171c;
          --ink-soft: #565f6c;
          --line: #e3e6ea;
          --paper: #fbfbfa;
          --panel: #ffffff;
          --accent: #5b3df0;
          --accent-soft: #efe9ff;
          --good: #0f7a52;
          --warn: #b5580b;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
          background: var(--paper);
          min-height: 100vh;
          color: var(--ink);
          padding: 32px 20px 80px;
        }
        .lc-shell { max-width: 1080px; margin: 0 auto; }
        .lc-header { margin-bottom: 28px; }
        .lc-eyebrow {
          font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
          color: var(--accent); margin-bottom: 6px;
        }
        .lc-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
        .lc-subtitle { color: var(--ink-soft); font-size: 14px; margin: 0; }

        .lc-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 860px) { .lc-grid { grid-template-columns: 1fr; } }

        .lc-panel {
          background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 22px; box-shadow: 0 1px 2px rgba(20,23,28,0.03);
        }
        .lc-panel + .lc-panel { margin-top: 20px; }
        .lc-panel-title {
          font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
          color: var(--ink-soft); margin: 0 0 14px;
        }

        .lc-combo { position: relative; }
        .lc-combo-input {
          display: flex; align-items: center; gap: 10px;
          border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px;
          background: #fff; cursor: text;
        }
        .lc-combo-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .lc-combo-input input {
          border: none; outline: none; flex: 1; font-size: 14.5px; background: transparent; color: var(--ink);
        }
        .lc-combo-list {
          position: absolute; z-index: 20; top: calc(100% + 6px); left: 0; right: 0;
          background: #fff; border: 1px solid var(--line); border-radius: 10px;
          max-height: 320px; overflow-y: auto; box-shadow: 0 12px 32px rgba(20,23,28,0.12);
        }
        .lc-combo-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f1f2f4; }
        .lc-combo-item:last-child { border-bottom: none; }
        .lc-combo-item:hover, .lc-combo-item.active { background: var(--accent-soft); }
        .lc-combo-item-id { font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
        .lc-combo-item-name { font-size: 14px; font-weight: 600; }
        .lc-combo-item-meta { font-size: 12px; color: var(--ink-soft); }
        .lc-combo-empty { padding: 16px; text-align: center; color: var(--ink-soft); font-size: 13px; }

        .lc-car-card {
          margin-top: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 20px;
          background: #f6f5ff; border: 1px solid #e5e0fb; border-radius: 12px; padding: 16px;
        }
        .lc-car-card-name { grid-column: 1 / -1; font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .lc-car-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); }
        .lc-car-stat-value { font-size: 13.5px; font-weight: 600; }

          border: 1px solid var(--line); border-radius: 10px; padding: 10px 8px; text-align: center;
          cursor: pointer; background: #fff; font-size: 12.5px; font-weight: 600; line-height: 1.3;
          transition: all .12s ease;
        }
        .lc-lease-chip:hover { border-color: var(--accent); }
        .lc-lease-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .lc-lease-chip .lc-chip-sub { display: block; font-weight: 400; opacity: .75; font-size: 11px; margin-top: 2px; }

        .lc-mileage-label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); margin: 16px 0 8px; }
        .lc-mileage-toggle { display: flex; gap: 8px; }
        .lc-mileage-btn {
          flex: 1; text-align: center; border: 1px solid var(--line); border-radius: 9px;
          padding: 9px 8px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: #fff;
          transition: all .12s ease;
        }
        .lc-mileage-btn:hover { border-color: var(--accent); }
        .lc-mileage-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        .lc-coverage-note {
          margin-top: 10px; font-size: 12.5px; line-height: 1.5; color: var(--ink-soft);
          background: #f6f5ff; border: 1px solid #e5e0fb; border-radius: 9px; padding: 10px 12px;
        }
        .lc-coverage-label { font-weight: 700; color: var(--ink); margin-right: 4px; }

        .lc-inputs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .lc-field { display: flex; flex-direction: column; gap: 6px; }
        .lc-field-label { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
        .lc-field-input-wrap {
          display: flex; align-items: center; border: 1px solid var(--line); border-radius: 9px;
          padding: 9px 12px; background: #fff;
        }
        .lc-field-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .lc-field-input-wrap input {
          border: none; outline: none; width: 100%; font-size: 14.5px; font-variant-numeric: tabular-nums;
          background: transparent; color: var(--ink);
        }
        .lc-suffix { font-size: 13px; color: var(--ink-soft); margin-left: 6px; }

        .lc-reset-btn {
          margin-top: 14px; display: inline-flex; align-items: center; gap: 6px;
          font-size: 12.5px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0;
          font-weight: 600;
        }

        .lc-row {
          display: flex; justify-content: space-between; align-items: center;
          padding: 9px 0; border-bottom: 1px solid #f1f2f4; font-size: 14px;
        }
        .lc-row-sub .lc-row-label { color: var(--ink-soft); font-weight: 400; }
        .lc-row-sub .lc-row-value { color: var(--ink-soft); font-weight: 500; }
        .lc-row-strong { border-bottom: none; border-top: 2px solid var(--ink); margin-top: 6px; padding-top: 14px; }
        .lc-row-strong .lc-row-label { font-weight: 700; font-size: 15px; }
        .lc-row-strong .lc-row-value { font-weight: 800; font-size: 17px; }
        .lc-row-label { font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .lc-row-value { font-variant-numeric: tabular-nums; font-weight: 600; }

        .lc-hint-wrap { position: relative; display: inline-flex; color: var(--ink-soft); cursor: help; }
        .lc-hint {
          display: none; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
          background: var(--ink); color: #fff; font-size: 11.5px; font-weight: 400; line-height: 1.4;
          padding: 8px 10px; border-radius: 8px; width: 200px; z-index: 30;
        }
        .lc-hint-wrap:hover .lc-hint { display: block; }

        .lc-monthly-card {
          background: linear-gradient(135deg, #5b3df0, #7a5af5);
          border-radius: 14px; padding: 24px; color: #fff; text-align: center; margin-bottom: 18px;
        }
        .lc-monthly-label { font-size: 12.5px; text-transform: uppercase; letter-spacing: .06em; opacity: .85; margin-bottom: 6px; }
        .lc-monthly-value { font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .lc-monthly-sub { font-size: 12.5px; opacity: .85; margin-top: 4px; }

        .lc-empty-state {
          text-align: center; padding: 60px 20px; color: var(--ink-soft);
        }
        .lc-empty-state svg { margin-bottom: 12px; opacity: .5; }

        .lc-warning {
          display: flex; gap: 8px; align-items: flex-start; background: #fff6ea; border: 1px solid #f3d9a8;
          color: var(--warn); font-size: 12.5px; padding: 10px 12px; border-radius: 9px; margin-top: 14px;
        }

        .lc-quote-btn {
          width: 100%; margin-top: 16px; padding: 13px; border-radius: 10px; border: none;
          background: var(--ink); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
          transition: opacity .12s ease;
        }
        .lc-quote-btn:hover { opacity: .88; }

        /* ---------- Quotation overlay ---------- */
        .lc-quote-overlay {
          position: fixed; inset: 0; background: #ecebe8; z-index: 100; overflow-y: auto; padding: 24px 16px 60px;
        }
        .lc-quote-toolbar {
          max-width: 760px; margin: 0 auto 16px; display: flex; justify-content: space-between; gap: 10px;
        }
        .lc-quote-toolbar-btn {
          border: none; border-radius: 9px; padding: 10px 16px; font-size: 13.5px; font-weight: 700;
          cursor: pointer; background: #1c1cf0; color: #fff;
        }
        .lc-quote-toolbar-btn-ghost { background: transparent; color: #14171c; border: 1px solid #cfd2d7; }

        .lc-quote-doc {
          max-width: 760px; margin: 0 auto; background: #fff; border-radius: 14px; overflow: hidden;
          box-shadow: 0 8px 30px rgba(20,23,28,0.12); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .lc-quote-banner { background: #1c1cf0; color: #fff; padding: 28px 36px 24px; }
        .lc-quote-logo { font-size: 22px; font-weight: 800; letter-spacing: .02em; }
        .lc-quote-banner-sub { font-size: 13.5px; opacity: .9; margin-top: 4px; }

        .lc-quote-body { padding: 30px 36px 10px; }
        .lc-quote-title { font-size: 21px; font-weight: 800; margin: 0 0 4px; color: #14171c; }
        .lc-quote-tagline { font-size: 13px; color: #7a828e; margin: 0 0 18px; }

        .lc-quote-car-grid {
          display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 20px;
          border-top: 1px solid #eceef1; border-bottom: 1px solid #eceef1; padding: 14px 0; margin-bottom: 26px;
        }
        .lc-quote-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #9aa1ab; }
        .lc-quote-value { display: block; font-size: 13.5px; font-weight: 600; color: #14171c; margin-top: 2px; }

        .lc-quote-section-title {
          font-size: 12.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
          color: #14171c; margin: 0 0 12px;
        }

        .lc-quote-price-grid { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        @media (max-width: 560px) { .lc-quote-price-grid { grid-template-columns: 1fr; } }
        .lc-quote-price-box { background: #f6f5ff; border: 1px solid #e5e0fb; border-radius: 12px; padding: 16px; }
        .lc-quote-price-hero { background: #1c1cf0; border-color: #1c1cf0; color: #fff; }
        .lc-quote-price-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; opacity: .8; }
        .lc-quote-price-hero-value { font-size: 26px; font-weight: 800; margin-top: 4px; }
        .lc-quote-price-box-value { font-size: 19px; font-weight: 800; margin-top: 4px; color: #14171c; }
        .lc-quote-price-sub { font-size: 11.5px; opacity: .75; margin-top: 3px; }

        .lc-quote-included { list-style: none; margin: 0 0 28px; padding: 0; }
        .lc-quote-included li {
          font-size: 13.5px; padding: 9px 0; border-bottom: 1px solid #f1f2f4; color: #33383f;
        }
        .lc-quote-included li strong { color: #14171c; }

        .lc-quote-table { width: 100%; border-collapse: collapse; margin-bottom: 26px; font-size: 13px; }
        .lc-quote-table th {
          background: #1c1cf0; color: #fff; text-align: left; padding: 9px 12px; font-weight: 700;
          text-transform: uppercase; font-size: 11px; letter-spacing: .03em;
        }
        .lc-quote-table td { padding: 9px 12px; border-bottom: 1px solid #eceef1; color: #33383f; }
        .lc-quote-table tr:nth-child(even) td { background: #fbfbfc; }

        .lc-quote-footer {
          border-top: 1px solid #eceef1; padding: 18px 36px 26px; display: flex; justify-content: space-between;
          align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .lc-quote-footer-logo { font-weight: 800; color: #1c1cf0; font-size: 14px; }
        .lc-quote-footer-text { display: flex; flex-direction: column; align-items: flex-end; font-size: 11px; color: #9aa1ab; }

        @media print {
          body * { visibility: hidden; }
          .lc-quote-overlay, .lc-quote-overlay * { visibility: visible; }
          .lc-quote-overlay { position: absolute; inset: 0; background: #fff; padding: 0; }
          .lc-quote-toolbar { display: none; }
          .lc-quote-doc { box-shadow: none; max-width: 100%; border-radius: 0; }
        }
